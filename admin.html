<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteChecklist - Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="admin.html" class="navbar-brand">SiteChecklist - Admin</a>
    <div class="navbar-user">
      <span class="badge badge-admin">Admin</span>
      <button class="btn btn-outline btn-sm" id="logout-btn">Deconnexion</button>
    </div>
  </nav>

  <div class="container">
    <div class="admin-grid">
      <!-- Section Codes d'accès -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Codes d'acces</h3>
        </div>
        <form id="settings-form">
          <div class="form-group">
            <label for="admin-code">Code Admin</label>
            <input type="text" id="admin-code" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="famille-code">Code Famille</label>
            <input type="text" id="famille-code" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="dev-code">Code Dev</label>
            <input type="text" id="dev-code" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary btn-sm">Sauvegarder les codes</button>
        </form>
      </div>

      <!-- Section Checklists -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Checklists</h3>
          <button class="btn btn-primary btn-sm" id="add-checklist-btn">+ Nouvelle</button>
        </div>
        <table class="admin-table" id="checklists-table">
          <thead>
            <tr>
              <th>Titre</th>
              <th>Categorie</th>
              <th>Items</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="checklists-table-body"></tbody>
        </table>
        <div id="checklists-empty" class="empty-state hidden">
          <p>Aucune checklist. Cree ta premiere !</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Checklist -->
  <div id="checklist-modal" class="modal-overlay">
    <div class="modal">
      <h2 id="checklist-modal-title">Nouvelle checklist</h2>
      <form id="checklist-form">
        <input type="hidden" id="checklist-edit-id">
        <div class="form-group">
          <label for="checklist-title-input">Titre</label>
          <input type="text" id="checklist-title-input" class="form-control" placeholder="Ma checklist" required>
        </div>
        <div class="form-group">
          <label for="checklist-category">Categorie</label>
          <select id="checklist-category" class="form-control" required>
            <option value="famille">Famille</option>
            <option value="dev">Dev</option>
            <option value="both">Les deux</option>
          </select>
        </div>
        <div class="form-group">
          <label>Items (un par ligne)</label>
          <textarea id="checklist-items-input" class="form-control" rows="8" placeholder="Item 1&#10;Item 2&#10;Item 3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="cancel-checklist-btn">Annuler</button>
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/store.js"></script>
  <script>
    // Vérifier la session admin
    const role = getSession();
    if (role !== 'admin') {
      window.location.href = 'index.html';
    }

    // Déconnexion
    document.getElementById('logout-btn').addEventListener('click', () => {
      clearSession();
      window.location.href = 'index.html';
    });

    // ============================================
    // CODES D'ACCÈS
    // ============================================
    const settings = getSettings();
    document.getElementById('admin-code').value = settings.adminCode;
    document.getElementById('famille-code').value = settings.familleCode;
    document.getElementById('dev-code').value = settings.devCode;

    document.getElementById('settings-form').addEventListener('submit', (e) => {
      e.preventDefault();
      updateSettings({
        adminCode: document.getElementById('admin-code').value.trim(),
        familleCode: document.getElementById('famille-code').value.trim(),
        devCode: document.getElementById('dev-code').value.trim()
      });
      showToast('Codes sauvegardes !', 'success');
    });

    // ============================================
    // CHECKLISTS
    // ============================================
    function renderChecklists() {
      const checklists = getChecklists();
      const tbody = document.getElementById('checklists-table-body');
      const empty = document.getElementById('checklists-empty');
      const table = document.getElementById('checklists-table');

      tbody.innerHTML = '';

      if (checklists.length === 0) {
        empty.classList.remove('hidden');
        table.classList.add('hidden');
        return;
      }

      empty.classList.add('hidden');
      table.classList.remove('hidden');

      checklists.forEach(cl => {
        const tr = document.createElement('tr');
        const checked = (cl.items || []).filter(i => i.checked).length;
        const catLabel = cl.category === 'both' ? 'Tous' : cl.category;
        const catClass = cl.category === 'both' ? 'admin' : cl.category;

        tr.innerHTML = `
          <td>${escapeHtml(cl.title)}</td>
          <td><span class="badge badge-${catClass}">${catLabel}</span></td>
          <td>${checked}/${cl.items.length}</td>
          <td>
            <button class="btn btn-outline btn-sm edit-btn" data-id="${cl.id}">Modifier</button>
            <button class="btn btn-danger btn-sm delete-btn" data-id="${cl.id}">Supprimer</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      // Event listeners pour les boutons
      document.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => openEditModal(btn.dataset.id));
      });
      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (confirm('Supprimer cette checklist ?')) {
            deleteChecklist(btn.dataset.id);
            renderChecklists();
            showToast('Checklist supprimee.', 'success');
          }
        });
      });
    }

    // Modal
    document.getElementById('add-checklist-btn').addEventListener('click', () => {
      document.getElementById('checklist-modal-title').textContent = 'Nouvelle checklist';
      document.getElementById('checklist-form').reset();
      document.getElementById('checklist-edit-id').value = '';
      document.getElementById('checklist-modal').classList.add('show');
    });

    document.getElementById('cancel-checklist-btn').addEventListener('click', () => {
      document.getElementById('checklist-modal').classList.remove('show');
    });

    document.getElementById('checklist-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('checklist-modal').classList.remove('show');
      }
    });

    function openEditModal(id) {
      const cl = getChecklist(id);
      if (!cl) return;

      document.getElementById('checklist-modal-title').textContent = 'Modifier la checklist';
      document.getElementById('checklist-edit-id').value = id;
      document.getElementById('checklist-title-input').value = cl.title;
      document.getElementById('checklist-category').value = cl.category;
      document.getElementById('checklist-items-input').value = (cl.items || []).map(i => i.text).join('\n');
      document.getElementById('checklist-modal').classList.add('show');
    }

    document.getElementById('checklist-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const editId = document.getElementById('checklist-edit-id').value;
      const title = document.getElementById('checklist-title-input').value.trim();
      const category = document.getElementById('checklist-category').value;
      const itemsText = document.getElementById('checklist-items-input').value.trim();

      if (!title) {
        showToast('Le titre est requis.', 'error');
        return;
      }

      if (editId) {
        updateChecklist(editId, title, category, itemsText);
        showToast('Checklist mise a jour !', 'success');
      } else {
        addChecklist(title, category, itemsText);
        showToast('Checklist creee !', 'success');
      }

      document.getElementById('checklist-modal').classList.remove('show');
      renderChecklists();
    });

    // ============================================
    // UTILITAIRES
    // ============================================
    function showToast(message, type = '') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'toast' + (type ? ' ' + type : '');
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Init
    renderChecklists();
  </script>
</body>
</html>
