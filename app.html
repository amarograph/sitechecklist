<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteChecklist - Mes Checklists</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <a href="app.html" class="navbar-brand">SiteChecklist</a>
    <div class="navbar-user">
      <span id="user-badge" class="badge"></span>
      <button class="btn btn-outline btn-sm" id="logout-btn">Deconnexion</button>
    </div>
  </nav>

  <div class="container">
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <p class="sidebar-title">Mes Checklists</p>
        <ul id="checklist-list" class="sidebar-list"></ul>
      </aside>

      <!-- Contenu principal -->
      <main id="main-content">
        <div id="empty-state" class="empty-state hidden">
          <h3>Aucune checklist</h3>
          <p>Aucune checklist disponible pour ta categorie.</p>
        </div>

        <div id="checklist-view" class="checklist-container hidden">
          <div class="checklist-header">
            <div>
              <h2 id="checklist-title"></h2>
              <span id="checklist-badge" class="badge"></span>
            </div>
            <div>
              <span id="checklist-progress-text"></span>
            </div>
          </div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
          <ul id="checklist-items" class="checklist-items mt-2"></ul>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/store.js"></script>
  <script>
    // Vérifier la session
    const role = getSession();
    if (!role) {
      window.location.href = 'index.html';
    }
    if (role === 'admin') {
      window.location.href = 'admin.html';
    }

    let currentChecklistId = null;

    // UI
    const badge = document.getElementById('user-badge');
    badge.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    badge.classList.add('badge-' + role);

    document.getElementById('logout-btn').addEventListener('click', () => {
      clearSession();
      window.location.href = 'index.html';
    });

    // Charger les checklists
    function render() {
      const checklists = getChecklists(role);
      const list = document.getElementById('checklist-list');
      const emptyState = document.getElementById('empty-state');
      const checklistView = document.getElementById('checklist-view');

      list.innerHTML = '';

      if (checklists.length === 0) {
        emptyState.classList.remove('hidden');
        checklistView.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');

      // Si pas de checklist sélectionnée, prendre la première
      if (!currentChecklistId || !checklists.find(c => c.id === currentChecklistId)) {
        currentChecklistId = checklists[0].id;
      }

      // Sidebar
      checklists.forEach(cl => {
        const li = document.createElement('li');
        li.className = 'sidebar-item' + (cl.id === currentChecklistId ? ' active' : '');
        const checked = (cl.items || []).filter(i => i.checked).length;
        li.innerHTML = '<span>' + escapeHtml(cl.title) + '</span><span class="item-count">' + checked + '/' + cl.items.length + '</span>';
        li.addEventListener('click', () => { currentChecklistId = cl.id; render(); });
        list.appendChild(li);
      });

      // Contenu
      const checklist = checklists.find(c => c.id === currentChecklistId);
      if (!checklist) return;

      checklistView.classList.remove('hidden');
      document.getElementById('checklist-title').textContent = checklist.title;

      const cbadge = document.getElementById('checklist-badge');
      const catLabel = checklist.category === 'both' ? 'Tous' : checklist.category;
      const catClass = checklist.category === 'both' ? 'admin' : checklist.category;
      cbadge.textContent = catLabel;
      cbadge.className = 'badge badge-' + catClass;

      const items = checklist.items || [];
      const checked = items.filter(i => i.checked).length;
      const percent = items.length > 0 ? Math.round((checked / items.length) * 100) : 0;
      document.getElementById('checklist-progress-text').textContent = checked + '/' + items.length + ' (' + percent + '%)';
      document.getElementById('progress-fill').style.width = percent + '%';

      const container = document.getElementById('checklist-items');
      container.innerHTML = '';

      items.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = 'checklist-item' + (item.checked ? ' checked' : '');
        li.innerHTML = '<div class="custom-checkbox">' + (item.checked ? '&#10003;' : '') + '</div><span class="item-text">' + escapeHtml(item.text) + '</span>';
        li.addEventListener('click', () => {
          toggleItem(checklist.id, index);
          render();
        });
        container.appendChild(li);
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    render();
  </script>
</body>
</html>
