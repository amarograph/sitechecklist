<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace Dev</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    :root {
      --theme: #0984e3;
      --theme-dark: #0773c7;
      --theme-light: #74b9ff;
      --theme-bg: #0a0e17;
      --theme-card: #131a2b;
      --theme-border: #1e2d4a;
      --theme-text: #e4e9f2;
      --theme-text-light: #8b95a8;
      --theme-gradient: linear-gradient(135deg, #0984e3 0%, #6c5ce7 100%);
    }

    body {
      background: var(--theme-bg);
      color: var(--theme-text);
    }

    .navbar {
      background: var(--theme-card);
      border-bottom: 1px solid var(--theme-border);
    }
    .navbar-brand { color: var(--theme); font-size: 1.5rem; font-family: 'Courier New', monospace; }
    .navbar-brand span { color: var(--theme-light); }
    .btn-logout {
      background: transparent;
      color: var(--theme-text-light);
      border: 1px solid var(--theme-border);
    }
    .btn-logout:hover { border-color: var(--theme); color: var(--theme); }

    .welcome-banner {
      background: var(--theme-gradient);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(9, 132, 227, 0.3);
      font-family: 'Courier New', monospace;
    }
    .welcome-banner h2 { font-size: 1.4rem; margin-bottom: 4px; }
    .welcome-banner p { opacity: 0.85; font-size: 0.9rem; }
    .welcome-banner code {
      background: rgba(255,255,255,0.15);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .sidebar {
      background: var(--theme-card);
      border: 1px solid var(--theme-border);
    }
    .sidebar-title { color: var(--theme-text-light); }
    .sidebar-item { color: var(--theme-text); }
    .sidebar-item.active {
      background: var(--theme);
      color: white;
    }
    .sidebar-item:hover:not(.active) { background: rgba(9, 132, 227, 0.1); }

    .card {
      background: var(--theme-card);
      border: 1px solid var(--theme-border);
    }

    .checklist-item {
      background: var(--theme-card);
      border: 1px solid var(--theme-border);
      color: var(--theme-text);
    }
    .checklist-item:hover {
      border-left: 3px solid var(--theme);
      box-shadow: 0 0 10px rgba(9, 132, 227, 0.15);
    }
    .checklist-item.checked .custom-checkbox {
      background: var(--theme);
      border-color: var(--theme);
    }
    .checklist-item.checked .item-text {
      color: var(--theme-text-light);
    }
    .custom-checkbox { border-color: var(--theme-border); }

    .progress-bar { background: var(--theme-border); }
    .progress-fill { background: var(--theme-gradient); }

    .empty-state { color: var(--theme-text-light); }
    .empty-state h3 { color: var(--theme-text); }

    .checklist-header h2 { color: var(--theme-text); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="dev.html" class="navbar-brand"><span>&gt;_</span> DevChecklist</a>
    <button class="btn btn-logout btn-sm" id="logout-btn">logout</button>
  </nav>

  <div class="container">
    <div class="welcome-banner">
      <h2>&gt; Welcome, Developer</h2>
      <p>Tes sprints, tes tasks, ton espace. <code>let's ship it</code></p>
    </div>

    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <p class="sidebar-title">// Checklists</p>
        <ul id="checklist-list" class="sidebar-list"></ul>
      </aside>

      <main id="main-content">
        <div id="empty-state" class="empty-state hidden">
          <h3>&#128187; Aucune checklist</h3>
          <p>Aucune task dev pour le moment. Go chill.</p>
        </div>

        <div id="checklist-view" class="card hidden">
          <div class="checklist-header">
            <h2 id="checklist-title"></h2>
            <span id="checklist-progress-text" style="color: var(--theme-text-light);"></span>
          </div>
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
          <ul id="checklist-items" class="checklist-items mt-2"></ul>
        </div>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/store.js"></script>
  <script>
    const role = getSession();
    if (!role || (role !== 'dev' && role !== 'admin')) {
      window.location.href = 'index.html';
    }

    document.getElementById('logout-btn').addEventListener('click', () => {
      clearSession();
      window.location.href = 'index.html';
    });

    let currentChecklistId = null;

    function render() {
      const checklists = getChecklists('dev');
      const list = document.getElementById('checklist-list');
      const emptyState = document.getElementById('empty-state');
      const checklistView = document.getElementById('checklist-view');

      list.innerHTML = '';

      if (checklists.length === 0) {
        emptyState.classList.remove('hidden');
        checklistView.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');

      if (!currentChecklistId || !checklists.find(c => c.id === currentChecklistId)) {
        currentChecklistId = checklists[0].id;
      }

      checklists.forEach(cl => {
        const li = document.createElement('li');
        li.className = 'sidebar-item' + (cl.id === currentChecklistId ? ' active' : '');
        const checked = (cl.items || []).filter(i => i.checked).length;
        li.innerHTML = '<span>' + esc(cl.title) + '</span><span class="item-count">' + checked + '/' + cl.items.length + '</span>';
        li.addEventListener('click', () => { currentChecklistId = cl.id; render(); });
        list.appendChild(li);
      });

      const cl = checklists.find(c => c.id === currentChecklistId);
      if (!cl) return;

      checklistView.classList.remove('hidden');
      document.getElementById('checklist-title').textContent = cl.title;

      const items = cl.items || [];
      const checked = items.filter(i => i.checked).length;
      const pct = items.length > 0 ? Math.round((checked / items.length) * 100) : 0;
      document.getElementById('checklist-progress-text').textContent = checked + '/' + items.length + ' (' + pct + '%)';
      document.getElementById('progress-fill').style.width = pct + '%';

      const container = document.getElementById('checklist-items');
      container.innerHTML = '';

      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = 'checklist-item' + (item.checked ? ' checked' : '');
        li.innerHTML = '<div class="custom-checkbox">' + (item.checked ? '&#10003;' : '') + '</div><span class="item-text">' + esc(item.text) + '</span>';
        li.addEventListener('click', () => { toggleItem(cl.id, i); render(); });
        container.appendChild(li);
      });
    }

    function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

    render();
  </script>
</body>
</html>
