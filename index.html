<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Taches</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    /* ===== LOGIN ===== */
    .login-page {
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
      background: #1a1a2e;
    }
    .login-card {
      background: #222244; border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
      margin: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .login-card h1 { text-align: center; font-size: 1.8rem; margin-bottom: 6px; }
    .login-card .subtitle { text-align: center; color: #8888aa; margin-bottom: 28px; font-size: 0.9rem; }
    .login-error { background: #e74c6f; color: white; padding: 10px 14px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 16px; display: none; text-align: center; }
    .login-error.show { display: block; }

    /* ===== FORMS ===== */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.85rem; color: #8888aa; }
    input, textarea, select {
      width: 100%; padding: 14px 18px; border: none; border-radius: 14px;
      font-size: 0.95rem; background: #2a2a4a; color: #eee; transition: all 0.2s;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { outline: none; box-shadow: 0 0 0 2px #e74c6f; }
    input::placeholder { color: #666688; }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 12px 24px; border: none; border-radius: 14px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .btn:hover { transform: translateY(-1px); opacity: 0.9; }
    .btn-primary { background: linear-gradient(135deg, #e74c6f, #c94b8c); color: white; width: 100%; font-size: 1rem; }
    .btn-green { background: #00b894; color: white; }
    .btn-red { background: #e74c6f; color: white; }
    .btn-ghost { background: transparent; color: #8888aa; padding: 8px 16px; }
    .btn-ghost:hover { color: #e74c6f; }
    .btn-sm { padding: 8px 16px; font-size: 0.8rem; }
    .btn-icon {
      width: 44px; height: 44px; border-radius: 14px; display: flex;
      align-items: center; justify-content: center; padding: 0; font-size: 1.4rem;
    }

    /* ===== MAIN CONTAINER ===== */
    .app-container {
      max-width: 520px; margin: 0 auto; padding: 30px 20px; min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .app-header {
      display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px;
    }
    .app-header h1 { font-size: 1.6rem; font-weight: 700; }
    .app-header .date { color: #8888aa; font-size: 0.85rem; margin-top: 4px; }
    .header-icon { font-size: 1.8rem; margin-right: 10px; }

    /* ===== STATS ===== */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: #222244; border-radius: 16px; padding: 16px 20px; text-align: center;
      border: 1px solid #2a2a4a;
    }
    .stat-number { font-size: 1.8rem; font-weight: 700; }
    .stat-number.todo { color: #e74c6f; }
    .stat-number.inprogress { color: #f39c12; }
    .stat-number.done { color: #00b894; }
    .stat-label { font-size: 0.8rem; color: #8888aa; margin-top: 2px; }

    /* ===== ADD TASK ===== */
    .add-row {
      display: flex; gap: 10px; margin-bottom: 16px;
    }
    .add-row input {
      flex: 1; background: #222244; border: 1px solid #2a2a4a;
    }
    .add-btn {
      background: linear-gradient(135deg, #e74c6f, #c94b8c); color: white;
      width: 48px; height: 48px; border-radius: 14px; border: none;
      font-size: 1.6rem; cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; transition: all 0.2s;
    }
    .add-btn:hover { transform: scale(1.05); }

    /* ===== FILTER TABS ===== */
    .filter-tabs {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    .filter-tab {
      padding: 8px 20px; border-radius: 20px; border: none; font-size: 0.8rem;
      font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit;
      background: #222244; color: #8888aa; border: 1px solid #2a2a4a;
    }
    .filter-tab.active {
      background: linear-gradient(135deg, #e74c6f, #c94b8c); color: white; border-color: transparent;
    }
    .filter-tab:hover:not(.active) { border-color: #e74c6f; color: #e74c6f; }

    /* ===== CHECKLIST SELECTOR ===== */
    .checklist-selector {
      display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px;
    }
    .cl-tab {
      padding: 8px 18px; border-radius: 12px; border: 1px solid #2a2a4a;
      background: #222244; color: #8888aa; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; white-space: nowrap; font-family: inherit; transition: all 0.2s;
    }
    .cl-tab.active { background: #2a2a4a; color: #eee; border-color: #444466; }
    .cl-tab:hover:not(.active) { border-color: #555577; }

    /* ===== TASK ITEMS ===== */
    .task-list { list-style: none; }
    .task-item {
      display: flex; align-items: center; gap: 14px; padding: 16px 18px;
      background: #222244; border-radius: 14px; margin-bottom: 8px;
      border: 1px solid #2a2a4a; transition: all 0.2s;
    }
    .task-item:hover { border-color: #444466; }
    .task-item.checked { opacity: 0.5; }
    .task-item.checked .task-text { text-decoration: line-through; color: #666688; }
    .task-item.inprogress { border-color: #f39c12; }

    .task-check {
      width: 26px; height: 26px; border-radius: 50%; border: 2px solid #444466;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      flex-shrink: 0; transition: all 0.2s;
    }
    .task-item.checked .task-check {
      background: #00b894; border-color: #00b894; color: white;
    }
    .task-item.inprogress .task-check {
      background: #f39c12; border-color: #f39c12; color: white;
    }
    .task-check svg { width: 14px; height: 14px; }

    .task-text { flex: 1; font-size: 0.95rem; }

    .task-delete {
      background: none; border: none; color: #444466; font-size: 1.2rem;
      cursor: pointer; padding: 4px; transition: color 0.2s; line-height: 1;
    }
    .task-delete:hover { color: #e74c6f; }

    /* ===== ADMIN ===== */
    .admin-section { margin-bottom: 24px; }
    .admin-section h2 { font-size: 1.1rem; margin-bottom: 12px; color: #ccc; }
    .admin-card {
      background: #222244; border-radius: 16px; padding: 20px; margin-bottom: 12px;
      border: 1px solid #2a2a4a;
    }
    .admin-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #2a2a4a;
    }
    .admin-row:last-child { border-bottom: none; }
    .admin-actions { display: flex; gap: 6px; }

    .badge { padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .badge-dev { background: #0984e3; color: white; }
    .badge-famille { background: #00b894; color: white; }
    .badge-both { background: #6c5ce7; color: white; }
    .badge-admin { background: #e74c6f; color: white; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none;
      justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #222244; border-radius: 20px; padding: 30px; width: 100%;
      max-width: 440px; margin: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .modal h2 { margin-bottom: 20px; font-size: 1.2rem; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }

    /* ===== TOAST ===== */
    .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 2000; }
    .toast {
      background: #00b894; color: white; padding: 12px 24px; border-radius: 12px;
      margin-top: 8px; font-size: 0.9rem; font-weight: 500;
      animation: fadeUp 0.3s; text-align: center;
    }
    .toast.error { background: #e74c6f; }
    @keyframes fadeUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .hidden { display: none !important; }

    .logout-row { text-align: center; margin-top: 20px; }

    .empty-msg { text-align: center; padding: 40px; color: #666688; }
  </style>
</head>
<body>

  <!-- ==================== LOGIN ==================== -->
  <div id="page-login" class="login-page">
    <div class="login-card">
      <h1>&#128203; Mes Taches</h1>
      <p class="subtitle">Entre ton code d'acces</p>
      <div id="login-error" class="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <input type="password" id="code" placeholder="Code d'acces..." required autofocus>
        </div>
        <button type="submit" class="btn btn-primary">Entrer</button>
      </form>
    </div>
  </div>

  <!-- ==================== APP ==================== -->
  <div id="page-app" class="hidden">
    <div class="app-container">
      <!-- Header -->
      <div class="app-header">
        <div style="display:flex;align-items:center;">
          <span class="header-icon">&#128203;</span>
          <div>
            <h1>Mes Taches</h1>
            <div class="date" id="app-date"></div>
          </div>
        </div>
        <span id="app-badge" class="badge"></span>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number todo" id="stat-todo">0</div>
          <div class="stat-label">A faire</div>
        </div>
        <div class="stat-card">
          <div class="stat-number inprogress" id="stat-inprogress">0</div>
          <div class="stat-label">En cours</div>
        </div>
        <div class="stat-card">
          <div class="stat-number done" id="stat-done">0</div>
          <div class="stat-label">Terminees</div>
        </div>
      </div>

      <!-- Checklist selector (if multiple) -->
      <div id="cl-selector" class="checklist-selector hidden"></div>

      <!-- Add task -->
      <div class="add-row">
        <input type="text" id="add-input" placeholder="Ajouter une nouvelle tache...">
        <button class="add-btn" id="add-btn">+</button>
      </div>

      <!-- Filters -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">Toutes</button>
        <button class="filter-tab" data-filter="todo">A faire</button>
        <button class="filter-tab" data-filter="inprogress">En cours</button>
        <button class="filter-tab" data-filter="done">Terminees</button>
      </div>

      <!-- Tasks -->
      <ul id="task-list" class="task-list"></ul>
      <div id="app-empty" class="empty-msg hidden">Aucune tache.</div>

      <!-- Logout -->
      <div class="logout-row">
        <button class="btn btn-ghost" id="app-logout">Deconnexion</button>
      </div>
    </div>
  </div>

  <!-- ==================== ADMIN ==================== -->
  <div id="page-admin" class="hidden">
    <div class="app-container">
      <div class="app-header">
        <div style="display:flex;align-items:center;">
          <span class="header-icon">&#9881;</span>
          <div>
            <h1>Admin</h1>
            <div class="date" id="admin-date"></div>
          </div>
        </div>
        <span class="badge badge-admin">Admin</span>
      </div>

      <!-- Quick view buttons -->
      <div class="stats-row" style="margin-bottom:24px;">
        <button class="btn btn-green btn-sm" style="width:100%;padding:14px;" onclick="switchView('dev')">&#128187; Voir Dev</button>
        <button class="btn btn-green btn-sm" style="width:100%;padding:14px;background:#00b894;" onclick="switchView('famille')">&#127968; Voir Famille</button>
      </div>

      <!-- Codes -->
      <div class="admin-section">
        <h2>&#128272; Codes d'acces</h2>
        <div class="admin-card">
          <form id="codes-form">
            <div class="form-group"><label>Code Admin</label><input type="text" id="s-admin"></div>
            <div class="form-group"><label>Code Famille</label><input type="text" id="s-famille"></div>
            <div class="form-group"><label>Code Dev</label><input type="text" id="s-dev"></div>
            <button type="submit" class="btn btn-green btn-sm" style="margin-top:8px;">Sauvegarder</button>
          </form>
        </div>
      </div>

      <!-- Checklists -->
      <div class="admin-section">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <h2 style="margin:0;">&#128203; Checklists</h2>
          <button class="btn btn-red btn-sm" onclick="openModal()">+ Nouvelle</button>
        </div>
        <div id="admin-list"></div>
        <div id="admin-empty" class="empty-msg hidden">Aucune checklist.</div>
      </div>

      <div class="logout-row">
        <button class="btn btn-ghost" id="admin-logout">Deconnexion</button>
      </div>
    </div>
  </div>

  <!-- ==================== MODAL ==================== -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Nouvelle checklist</h2>
      <form id="modal-form">
        <input type="hidden" id="m-id">
        <div class="form-group"><label>Titre</label><input type="text" id="m-title" required placeholder="Ex: Sprint 12"></div>
        <div class="form-group">
          <label>Categorie</label>
          <select id="m-cat"><option value="dev">Dev</option><option value="famille">Famille</option><option value="both">Les deux</option></select>
        </div>
        <div class="form-group"><label>Items (un par ligne)</label><textarea id="m-items" rows="6" placeholder="Task 1&#10;Task 2&#10;Task 3" style="border-radius:14px;"></textarea></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Annuler</button>
          <button type="submit" class="btn btn-red">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <!-- ==================== JAVASCRIPT ==================== -->
  <script>
    // ============ STORE ============
    const SK = 'checklist_v2';
    const DEFAULTS = {
      settings: { adminCode: 'admin2024', familleCode: 'famille', devCode: 'dev123' },
      checklists: [
        { id: 'd1', title: 'Sprint - Fix bugs', category: 'dev', items: [
          { text: 'Fix login page', status: 'todo' }, { text: 'Update API endpoint', status: 'done' }, { text: 'Write unit tests', status: 'inprogress' }
        ]},
        { id: 'f1', title: 'Courses de la semaine', category: 'famille', items: [
          { text: 'Pain', status: 'todo' }, { text: 'Lait', status: 'done' }, { text: 'Oeufs', status: 'inprogress' }, { text: 'Fruits', status: 'todo' }
        ]}
      ]
    };
    // Migrate old data (checked boolean -> status string)
    function migrate(data) {
      data.checklists.forEach(cl => {
        cl.items.forEach(item => {
          if (item.status === undefined) {
            item.status = item.checked ? 'done' : 'todo';
            delete item.checked;
          }
        });
      });
      return data;
    }
    function load() { const d=localStorage.getItem(SK); if(d){const p=JSON.parse(d);return migrate(p);} save(DEFAULTS); return DEFAULTS; }
    function save(d) { localStorage.setItem(SK,JSON.stringify(d)); }
    function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); }
    function verifyCode(c) { const s=load().settings; if(c===s.adminCode)return'admin'; if(c===s.familleCode)return'famille'; if(c===s.devCode)return'dev'; return null; }
    function getRole() { return sessionStorage.getItem('cl_role'); }
    function setRole(r) { sessionStorage.setItem('cl_role',r); }
    function clearRole() { sessionStorage.removeItem('cl_role'); }

    // ============ DATE ============
    function formatDate() {
      const d = new Date();
      const days = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
      const months = ['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
      return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
    }

    // ============ PAGES ============
    function showPage(p) {
      document.getElementById('page-login').classList.toggle('hidden',p!=='login');
      document.getElementById('page-app').classList.toggle('hidden',p!=='app');
      document.getElementById('page-admin').classList.toggle('hidden',p!=='admin');
    }

    // ============ LOGIN ============
    document.getElementById('login-form').addEventListener('submit',(e)=>{
      e.preventDefault();
      const code=document.getElementById('code').value.trim();
      const err=document.getElementById('login-error');
      err.classList.remove('show');
      const role=verifyCode(code);
      if(!role){err.textContent='Code incorrect.';err.classList.add('show');return;}
      setRole(role);
      if(role==='admin'){showPage('admin');initAdmin();}
      else{showPage('app');initApp(role);}
    });

    // ============ APP ============
    let appRole=null, appCurrent=null, appFilter='all';

    function initApp(role) {
      appRole=role; appFilter='all'; appCurrent=null;
      document.getElementById('app-date').textContent=formatDate();
      const b=document.getElementById('app-badge');
      b.textContent=role==='dev'?'Dev':'Famille';
      b.className='badge badge-'+role;
      // reset filter tabs
      document.querySelectorAll('.filter-tab').forEach(t=>t.classList.toggle('active',t.dataset.filter==='all'));
      renderApp();
    }

    document.getElementById('app-logout').addEventListener('click',()=>{clearRole();showPage('login');});

    // Filter tabs
    document.querySelectorAll('.filter-tab').forEach(tab=>{
      tab.addEventListener('click',()=>{
        appFilter=tab.dataset.filter;
        document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        renderApp();
      });
    });

    // Add task
    function addTask() {
      const input=document.getElementById('add-input');
      const text=input.value.trim();
      if(!text||!appCurrent) return;
      const data=load();
      const cl=data.checklists.find(c=>c.id===appCurrent);
      if(!cl) return;
      cl.items.push({text,status:'todo'});
      save(data); input.value=''; renderApp();
      toast('Tache ajoutee !');
    }
    document.getElementById('add-btn').addEventListener('click',addTask);
    document.getElementById('add-input').addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();addTask();}});

    function renderApp() {
      const data=load();
      const lists=data.checklists.filter(c=>c.category===appRole||c.category==='both');

      // Checklist selector
      const sel=document.getElementById('cl-selector');
      sel.innerHTML='';
      if(lists.length>1){
        sel.classList.remove('hidden');
        if(!appCurrent||!lists.find(c=>c.id===appCurrent)) appCurrent=lists[0].id;
        lists.forEach(cl=>{
          const btn=document.createElement('button');
          btn.className='cl-tab'+(cl.id===appCurrent?' active':'');
          btn.textContent=cl.title;
          btn.onclick=()=>{appCurrent=cl.id;renderApp();};
          sel.appendChild(btn);
        });
      } else if(lists.length===1) {
        sel.classList.add('hidden');
        appCurrent=lists[0].id;
      } else {
        sel.classList.add('hidden');
        document.getElementById('task-list').innerHTML='';
        document.getElementById('app-empty').classList.remove('hidden');
        document.getElementById('stat-todo').textContent='0';
        document.getElementById('stat-done').textContent='0';
        return;
      }

      const cl=lists.find(c=>c.id===appCurrent);
      if(!cl) return;

      const items=cl.items||[];
      const todoCount=items.filter(i=>i.status==='todo').length;
      const ipCount=items.filter(i=>i.status==='inprogress').length;
      const doneCount=items.filter(i=>i.status==='done').length;
      document.getElementById('stat-todo').textContent=todoCount;
      document.getElementById('stat-inprogress').textContent=ipCount;
      document.getElementById('stat-done').textContent=doneCount;

      // Filter
      let filtered=items.map((item,i)=>({...item,idx:i}));
      if(appFilter==='todo') filtered=filtered.filter(i=>i.status==='todo');
      if(appFilter==='inprogress') filtered=filtered.filter(i=>i.status==='inprogress');
      if(appFilter==='done') filtered=filtered.filter(i=>i.status==='done');

      const container=document.getElementById('task-list');
      const emptyEl=document.getElementById('app-empty');
      container.innerHTML='';

      if(!filtered.length){emptyEl.classList.remove('hidden');}
      else{emptyEl.classList.add('hidden');}

      const nextStatus = { todo: 'inprogress', inprogress: 'done', done: 'todo' };
      const statusIcons = {
        todo: '',
        inprogress: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M12 6v6l4 2"/></svg>',
        done: '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>'
      };

      filtered.forEach(item=>{
        const li=document.createElement('li');
        li.className='task-item'+(item.status==='done'?' checked':'')+(item.status==='inprogress'?' inprogress':'');

        const check=document.createElement('div');
        check.className='task-check';
        check.innerHTML=statusIcons[item.status];
        check.title='Clic: '+{todo:'En cours',inprogress:'Terminee',done:'A faire'}[item.status];
        check.onclick=(e)=>{e.stopPropagation();items[item.idx].status=nextStatus[item.status];save(data);renderApp();};

        const text=document.createElement('span');
        text.className='task-text';
        text.textContent=item.text;

        const del=document.createElement('button');
        del.className='task-delete';
        del.innerHTML='&times;';
        del.onclick=(e)=>{e.stopPropagation();items.splice(item.idx,1);save(data);renderApp();toast('Tache supprimee.');};

        li.appendChild(check);
        li.appendChild(text);
        li.appendChild(del);
        container.appendChild(li);
      });
    }

    function switchView(role){setRole(role);showPage('app');initApp(role);}

    // ============ ADMIN ============
    function initAdmin(){
      document.getElementById('admin-date').textContent=formatDate();
      const s=load().settings;
      document.getElementById('s-admin').value=s.adminCode;
      document.getElementById('s-famille').value=s.familleCode;
      document.getElementById('s-dev').value=s.devCode;
      renderAdmin();
    }
    document.getElementById('admin-logout').addEventListener('click',()=>{clearRole();showPage('login');});
    document.getElementById('codes-form').addEventListener('submit',(e)=>{
      e.preventDefault();
      const d=load();
      d.settings.adminCode=document.getElementById('s-admin').value.trim();
      d.settings.familleCode=document.getElementById('s-famille').value.trim();
      d.settings.devCode=document.getElementById('s-dev').value.trim();
      save(d); toast('Codes sauvegardes !');
    });

    function renderAdmin(){
      const data=load();
      const list=document.getElementById('admin-list');
      const empty=document.getElementById('admin-empty');
      list.innerHTML='';
      if(!data.checklists.length){empty.classList.remove('hidden');return;}
      empty.classList.add('hidden');
      data.checklists.forEach(cl=>{
        const ck=cl.items.filter(i=>i.status==='done').length;
        const cat=cl.category==='both'?'Tous':cl.category;
        const cls=cl.category==='both'?'both':cl.category;
        const card=document.createElement('div');
        card.className='admin-card';
        card.innerHTML=`
          <div class="admin-row">
            <div>
              <strong>${esc(cl.title)}</strong>
              <span class="badge badge-${cls}" style="margin-left:8px;">${cat}</span>
            </div>
            <div class="admin-actions">
              <span style="color:#8888aa;font-size:0.85rem;margin-right:8px;">${ck}/${cl.items.length}</span>
              <button class="btn btn-ghost btn-sm" onclick="editCl('${cl.id}')">Modifier</button>
              <button class="btn btn-ghost btn-sm" style="color:#e74c6f;" onclick="delCl('${cl.id}')">Suppr</button>
            </div>
          </div>
        `;
        list.appendChild(card);
      });
    }

    // Modal
    function openModal(cl){
      document.getElementById('modal-title').textContent=cl?'Modifier':'Nouvelle checklist';
      document.getElementById('m-id').value=cl?cl.id:'';
      document.getElementById('m-title').value=cl?cl.title:'';
      document.getElementById('m-cat').value=cl?cl.category:'dev';
      document.getElementById('m-items').value=cl?cl.items.map(i=>i.text).join('\n'):'';
      document.getElementById('modal').classList.add('show');
    }
    function closeModal(){document.getElementById('modal').classList.remove('show');}
    document.getElementById('modal').onclick=(e)=>{if(e.target===e.currentTarget)closeModal();};

    document.getElementById('modal-form').addEventListener('submit',(e)=>{
      e.preventDefault();
      const data=load(), id=document.getElementById('m-id').value;
      const title=document.getElementById('m-title').value.trim();
      const cat=document.getElementById('m-cat').value;
      const lines=document.getElementById('m-items').value.split('\n').map(l=>l.trim()).filter(l=>l);
      if(id){
        const cl=data.checklists.find(c=>c.id===id);
        if(cl){const old=cl.items;cl.title=title;cl.category=cat;cl.items=lines.map(t=>{const ex=old.find(o=>o.text===t);return{text:t,status:ex?ex.status:'todo'};});}
      } else {
        data.checklists.push({id:genId(),title,category:cat,items:lines.map(t=>({text:t,status:'todo'}))});
      }
      save(data);closeModal();renderAdmin();toast(id?'Mise a jour !':'Checklist creee !');
    });

    function editCl(id){const cl=load().checklists.find(c=>c.id===id);if(cl)openModal(cl);}
    function delCl(id){if(!confirm('Supprimer ?'))return;const d=load();d.checklists=d.checklists.filter(c=>c.id!==id);save(d);renderAdmin();toast('Supprimee.');}

    // ============ UTILS ============
    function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
    function toast(msg,err){
      const t=document.createElement('div');t.className='toast'+(err?' error':'');t.textContent=msg;
      document.getElementById('toast-container').appendChild(t);setTimeout(()=>t.remove(),3000);
    }

    // ============ INIT ============
    const sr=getRole();
    if(sr==='admin'){showPage('admin');initAdmin();}
    else if(sr){showPage('app');initApp(sr);}
    else showPage('login');
  </script>
</body>
</html>
