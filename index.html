<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiteChecklist - Connexion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>SiteChecklist</h1>
      <p class="subtitle">Entre ton code d'acces pour voir tes checklists</p>

      <div id="login-error" class="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="code">Code d'acces</label>
          <input type="password" id="code" class="form-control" placeholder="Entre ton code..." required autofocus>
        </div>
        <button type="submit" class="btn btn-primary">Entrer</button>
      </form>

      <p class="login-hint">Demande ton code a l'administrateur</p>
    </div>
  </div>

  <script src="js/store.js"></script>
  <script>
    // Vérifier si déjà connecté
    const session = getSession();
    if (session) {
      window.location.href = session === 'admin' ? 'admin.html' : 'app.html';
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const code = document.getElementById('code').value.trim();
      const errorDiv = document.getElementById('login-error');

      if (!code) {
        errorDiv.textContent = 'Entre un code.';
        errorDiv.classList.add('show');
        return;
      }

      const role = verifyCode(code);

      if (!role) {
        errorDiv.textContent = 'Code incorrect. Reessaie.';
        errorDiv.classList.add('show');
        return;
      }

      setSession(role);

      if (role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'app.html';
      }
    });
  </script>
</body>
</html>
